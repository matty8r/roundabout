<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- App icon: a roundabout circulation sign (UK mandatory-direction road sign — blue disc,
       three white curved arrows in rotational symmetry indicating clockwise flow) mounted on
       a post, standing against a sky-to-grass gradient — reads as a literal roadside sign
       rather than just an abstract pictogram. MenuBarIcon.svg is a separate, simpler
       arrows-only crop for the status item glyph and is unaffected by this composition. -->
  <defs>
    <linearGradient id="skyGrass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6EC6F1"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100" height="100" fill="url(#skyGrass)"/>

  <!-- post: flat grey with a lighter vertical stripe for a subtle rounded/metallic look -->
  <rect x="43" y="80" width="14" height="20" rx="2" fill="#9A9A9A" stroke="#6E6E6E" stroke-width="1.5"/>
  <rect x="45.5" y="80" width="3" height="20" fill="#B7B7B7"/>

  <!-- sign: same circle+arrows drawing as before, just scaled/repositioned via transform
       (translate to new center, scale, translate original center back to origin) rather than
       hand-recomputing every arrow/arrowhead coordinate for the new size. -->
  <g transform="translate(50,45.5) scale(0.815) translate(-50,-50)">
    <circle cx="50" cy="50" r="46" fill="#0060A9"/>
    <circle cx="50" cy="50" r="46" fill="none" stroke="#ffffff" stroke-width="3"/>
    <g fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="butt">
      <path d="M 70.78,38.00 A 24,24 0 0 1 65.43,68.38"/>
      <path d="M 50.00,74.00 A 24,24 0 0 1 26.36,54.18"/>
      <path d="M 29.22,38.00 A 24,24 0 0 1 58.21,27.44"/>
    </g>
    <g fill="#ffffff">
      <path d="M 59.30,73.52 L 70.06,72.34 L 62.34,63.14 Z"/>
      <path d="M 24.97,46.30 L 20.62,56.21 L 32.44,54.13 Z"/>
      <path d="M 65.73,30.18 L 59.32,21.46 L 55.22,32.74 Z"/>
    </g>
  </g>
</svg>
